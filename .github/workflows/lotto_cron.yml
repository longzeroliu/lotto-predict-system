name: Lotto Data Auto Fetcher

on:
  schedule:
    # 設定週一至週五晚上 9:30 (UTC 13:30) 執行，全面捕捉兩種彩券
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # 保留這個，讓你可以隨時在網頁上手動點擊執行測試

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
    - name: 複製倉庫程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        pip install pandas beautifulsoup4 requests

    - name: 執行爬蟲腳本
      run: python fetch_data.py

    - name: 將更新後的資料 Commit 並 Push 回 GitHub
      run: |
        git config --global user.name 'LottoBot'
        git config --global user.email 'bot@github.com'
        git add data/lotto.csv
        # 只有當檔案有變動時才 commit，避免報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新開獎數據: $(date +'%Y-%m-%d')" && git push)
